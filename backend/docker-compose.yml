version: '3.8'

services:

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Alok@1234
      POSTGRES_DB: qpallocator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:Alok@1234@db:5432/qpallocator
      JWT_SECRET: your_jwt_secret_here
    depends_on:
      - db

volumes:
  postgres_data:
